name: Build Desktop & Android

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────────────────────
  # 1. Build the Vite PWA (shared artifact used by all jobs)
  # ─────────────────────────────────────────────────────────
  build-web:
    name: Build Vite app
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Build energy-tv
        working-directory: artifacts/energy-tv
        env:
          BASE_PATH: /
          VITE_TMDB_API_KEY: ${{ secrets.VITE_TMDB_API_KEY }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: pnpm run build

      - name: Upload web dist
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: artifacts/energy-tv/dist/public
          retention-days: 1

  # ─────────────────────────────────────────────────────────
  # 2. Electron desktop builds (Linux · macOS · Windows)
  # ─────────────────────────────────────────────────────────
  build-electron:
    name: Electron – ${{ matrix.os-label }}
    needs: build-web
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            os-label: Linux
            electron-target: linux
          - os: macos-latest
            os-label: macOS
            electron-target: mac
          - os: windows-latest
            os-label: Windows
            electron-target: win

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Download web dist
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: electron/renderer

      - name: Create Electron package.json
        shell: bash
        run: |
          mkdir -p electron
          cat > electron/package.json << 'EOF'
          {
            "name": "energy-tv-desktop",
            "version": "1.0.0",
            "description": "EnergyTV Desktop",
            "main": "main.js",
            "author": {
            "name": "CrAzE / NELABEL",
            "email": "craze@nelabel"
            },
            "license": "MIT",
            "repository": {
              "type": "git",
              "url": "https://github.com/Xion97522/EnergyTV-2Beta"
            },
            "scripts": {
              "dist": "electron-builder"
            },
            "build": {
              "appId": "com.craze.energytv",
              "productName": "EnergyTV",
              "directories": {
                "output": "dist-electron"
              },
              "files": [
                "main.js",
                "preload.js",
                "renderer/**/*"
              ],
              "linux": {
                "target": ["deb", "AppImage"],
                "category": "AudioVideo"
              },
              "mac": {
                "target": ["dmg", "zip"],
                "category": "public.app-category.entertainment"
              },
              "win": {
                "target": ["nsis", "portable"]
              }
            },
            "devDependencies": {
              "electron": "^31.0.0",
              "electron-builder": "^24.13.3"
            }
          }
          EOF

      - name: Create Electron main.js
        shell: bash
        run: |
          cat > electron/main.js << 'EOF'
          const { app, BrowserWindow, session } = require('electron');
          const path = require('path');

          function createWindow() {
            const win = new BrowserWindow({
              width: 1280,
              height: 800,
              minWidth: 800,
              minHeight: 600,
              title: 'EnergyTV',
              webPreferences: {
                preload: path.join(__dirname, 'preload.js'),
                contextIsolation: true,
                nodeIntegration: false,
              },
            });

            session.defaultSession.webRequest.onHeadersReceived((details, callback) => {
              callback({
                responseHeaders: {
                  ...details.responseHeaders,
                  'Content-Security-Policy': [
                    "default-src 'self' 'unsafe-inline' 'unsafe-eval' data: blob: https: http:;"
                  ],
                },
              });
            });

            win.loadFile(path.join(__dirname, 'renderer', 'index.html'));
          }

          app.whenReady().then(() => {
            createWindow();
            app.on('activate', () => {
              if (BrowserWindow.getAllWindows().length === 0) createWindow();
            });
          });

          app.on('window-all-closed', () => {
            if (process.platform !== 'darwin') app.quit();
          });
          EOF

      - name: Create preload.js
        shell: bash
        run: |
          cat > electron/preload.js << 'EOF'
          // Intentionally minimal – add IPC bridges here if needed
          EOF

      - name: Install Electron deps
        working-directory: electron
        run: npm install

      - name: Build Electron app
        working-directory: electron
        run: npx electron-builder --${{ matrix.electron-target }} --publish never
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload Electron artifacts
        uses: actions/upload-artifact@v4
        with:
          name: electron-${{ matrix.os-label }}
          path: |
            electron/dist-electron/**/*.deb
            electron/dist-electron/**/*.AppImage
            electron/dist-electron/**/*.dmg
            electron/dist-electron/**/*.zip
            electron/dist-electron/**/*.exe
          if-no-files-found: warn

  # ─────────────────────────────────────────────────────────
  # 3. Android APK via Capacitor
  # ─────────────────────────────────────────────────────────
  build-apk:
    name: Android APK
    needs: build-web
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Download web dist
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: capacitor-app/www

      - name: Create Capacitor package.json
        run: |
          mkdir -p capacitor-app
          cat > capacitor-app/package.json << 'EOF'
          {
            "name": "energy-tv-android",
            "version": "1.0.0",
            "description": "EnergyTV Android",
            "license": "MIT",
            "dependencies": {
              "@capacitor/android": "^6.0.0",
              "@capacitor/cli": "^6.0.0",
              "@capacitor/core": "^6.0.0"
            }
          }
          EOF

      - name: Create capacitor.config.json
        run: |
          cat > capacitor-app/capacitor.config.json << 'EOF'
          {
            "appId": "com.craze.energytv",
            "appName": "EnergyTV",
            "webDir": "www",
            "server": {
              "androidScheme": "https",
              "allowNavigation": [
                "*.themoviedb.org",
                "*.supabase.co",
                "*.vidsrc.xyz",
                "*.vidsrc.to",
                "*.embedder.net"
              ]
            },
            "android": {
              "allowMixedContent": true,
              "captureInput": true,
              "webContentsDebuggingEnabled": false
            }
          }
          EOF

      - name: Install Capacitor
        working-directory: capacitor-app
        run: npm install

      - name: Add Android platform
        working-directory: capacitor-app
        run: npx cap add android

      - name: Sync web assets
        working-directory: capacitor-app
        run: npx cap sync android

      - name: Make gradlew executable
        working-directory: capacitor-app/android
        run: chmod +x gradlew

      - name: Build debug APK
        working-directory: capacitor-app/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: capacitor-app/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

  # ─────────────────────────────────────────────────────────
  # 4. Attach all artifacts to a GitHub Release (tag builds)
  # ─────────────────────────────────────────────────────────
  release:
    name: Publish Release
    needs: [build-electron, build-apk]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download Electron artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: 'electron-*'
          merge-multiple: true

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: release-assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/**/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
