name: Deploy EnergyTV to GitHub Pages

on:
  push:
    branches: ['**']
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build and deploy'
        required: false
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch || github.ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Determine base path
        id: basepath
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          if [ "${REPO_NAME}" = "${GITHUB_REPOSITORY_OWNER}.github.io" ]; then
            echo "base=/" >> "$GITHUB_OUTPUT"
          else
            echo "base=/${REPO_NAME}/" >> "$GITHUB_OUTPUT"
          fi

      - name: Build energy-tv
        working-directory: artifacts/energy-tv
        env:
          PORT: "5000"
          BASE_PATH: ${{ steps.basepath.outputs.base }}
          VITE_TMDB_API_KEY: ${{ secrets.VITE_TMDB_API_KEY }}
        run: pnpm run build

      - name: Add SPA 404 fallback
        run: cp artifacts/energy-tv/dist/public/index.html artifacts/energy-tv/dist/public/404.html

      - name: Add .nojekyll
        run: touch artifacts/energy-tv/dist/public/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: artifacts/energy-tv/dist/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
